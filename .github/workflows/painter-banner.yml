name: GitHub Painter Banner

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/painter-banner.yml"
      - "painter/canvas.json"
      - "scripts/render_github_painter_canvas.ps1"
      - "scripts/render_github_painter_glitch.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install GIF renderer dependency
        run: python -m pip install Pillow

      - name: Render painter preview and banner
        shell: pwsh
        run: ./scripts/render_github_painter_canvas.ps1

      - name: Render animated glitch banner
        run: python ./scripts/render_github_painter_glitch.py

      - name: Commit generated painter assets
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Assets/github-painter-preview.svg Assets/github-painter-banner.svg Assets/github-painter-banner.gif
          git diff --cached --quiet && exit 0
          git commit -m "chore: update github painter assets"
          git push
