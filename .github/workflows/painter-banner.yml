name: GitHub Painter Banner

on:
  push:
    branches:
      - main
    paths:
      - "painter/canvas.json"
      - "scripts/render_github_painter_canvas.ps1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Render painter preview and banner
        shell: pwsh
        run: ./scripts/render_github_painter_canvas.ps1

      - name: Commit generated painter assets
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add Assets/github-painter-preview.svg Assets/github-painter-banner.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update github painter assets"
          git push
